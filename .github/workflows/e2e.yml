name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Chromium runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libcups2 \
            libxshmfence1 \
            libdrm2 \
            libgtk-3-0 \
            libpango-1.0-0 \
            libpangocairo-1.0-0

      - name: Install dependencies
        run: npm ci

      - name: Verify Puppeteer Chromium shared library links
        run: |
          CHROMIUM_BIN=$(node -e "const puppeteer = require('puppeteer'); console.log(puppeteer.executablePath());")
          echo "Using Chromium binary: ${CHROMIUM_BIN}"
          ldd "${CHROMIUM_BIN}"

      - name: Run E2E tests
        run: npm run test:e2e
